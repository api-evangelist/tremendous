naftiko: 1.0.0-alpha2
info:
  label: Tremendous API — Orders
  description: 'Tremendous API — Orders. 4 operations. Lead operation: List Orders. Self-contained Naftiko capability covering
    one Tremendous business surface.'
  tags:
  - Tremendous
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TREMENDOUS_API_KEY: TREMENDOUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: tremendous-orders
    baseUri: https://testflight.tremendous.com/api/v2
    description: Tremendous API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return (max 100)
        - name: created_at_gte
          in: query
          type: string
          description: Filter orders created at or after this date
        - name: created_at_lte
          in: query
          type: string
          description: Filter orders created at or before this date
      - name: createorder
        method: POST
        description: Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-approve
      path: /orders/approve
      operations:
      - name: approveorder
        method: POST
        description: Approve Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-id
      path: /orders/{id}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Order ID
          required: true
    authentication:
      type: bearer
      token: '{{env.TREMENDOUS_API_KEY}}'
  exposes:
  - type: rest
    namespace: tremendous-orders-rest
    port: 8080
    description: REST adapter for Tremendous API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: listorders
        description: List Orders
        call: tremendous-orders.listorders
        with:
          offset: rest.offset
          limit: rest.limit
          created_at_gte: rest.created_at_gte
          created_at_lte: rest.created_at_lte
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorder
        description: Create Order
        call: tremendous-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/approve
      name: orders-approve
      description: REST surface for orders-approve.
      operations:
      - method: POST
        name: approveorder
        description: Approve Order
        call: tremendous-orders.approveorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{id}
      name: orders-id
      description: REST surface for orders-id.
      operations:
      - method: GET
        name: getorder
        description: Get Order
        call: tremendous-orders.getorder
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tremendous-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tremendous API — Orders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-orders
      description: List Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-orders.listorders
      with:
        offset: tools.offset
        limit: tools.limit
        created_at_gte: tools.created_at_gte
        created_at_lte: tools.created_at_lte
      outputParameters:
      - type: object
        mapping: $.
    - name: create-order
      description: Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tremendous-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: approve-order
      description: Approve Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tremendous-orders.approveorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-orders.getorder
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
