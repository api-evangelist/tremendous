naftiko: 1.0.0-alpha2
info:
  label: Tremendous API — Webhooks
  description: 'Tremendous API — Webhooks. 5 operations. Lead operation: List Webhooks. Self-contained Naftiko capability
    covering one Tremendous business surface.'
  tags:
  - Tremendous
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TREMENDOUS_API_KEY: TREMENDOUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: tremendous-webhooks
    baseUri: https://testflight.tremendous.com/api/v2
    description: Tremendous API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: listwebhooks
        method: GET
        description: List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createwebhook
        method: POST
        description: Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-id
      path: /webhooks/{id}
      operations:
      - name: getwebhook
        method: GET
        description: Get Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Webhook ID
          required: true
      - name: deletewebhook
        method: DELETE
        description: Delete Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Webhook ID
          required: true
    - name: webhooks-id-simulate
      path: /webhooks/{id}/simulate
      operations:
      - name: simulatewebhook
        method: POST
        description: Simulate Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Webhook ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TREMENDOUS_API_KEY}}'
  exposes:
  - type: rest
    namespace: tremendous-webhooks-rest
    port: 8080
    description: REST adapter for Tremendous API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: GET
        name: listwebhooks
        description: List Webhooks
        call: tremendous-webhooks.listwebhooks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create Webhook
        call: tremendous-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{id}
      name: webhooks-id
      description: REST surface for webhooks-id.
      operations:
      - method: GET
        name: getwebhook
        description: Get Webhook
        call: tremendous-webhooks.getwebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: Delete Webhook
        call: tremendous-webhooks.deletewebhook
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{id}/simulate
      name: webhooks-id-simulate
      description: REST surface for webhooks-id-simulate.
      operations:
      - method: POST
        name: simulatewebhook
        description: Simulate Webhook
        call: tremendous-webhooks.simulatewebhook
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tremendous-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tremendous API — Webhooks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-webhooks
      description: List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook
      description: Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tremendous-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-webhook
      description: Get Webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-webhooks.getwebhook
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tremendous-webhooks.deletewebhook
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: simulate-webhook
      description: Simulate Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tremendous-webhooks.simulatewebhook
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
