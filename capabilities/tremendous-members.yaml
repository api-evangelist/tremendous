naftiko: 1.0.0-alpha2
info:
  label: Tremendous API — Members
  description: 'Tremendous API — Members. 2 operations. Lead operation: List Members. Self-contained Naftiko capability covering
    one Tremendous business surface.'
  tags:
  - Tremendous
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TREMENDOUS_API_KEY: TREMENDOUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: tremendous-members
    baseUri: https://testflight.tremendous.com/api/v2
    description: Tremendous API — Members business capability. Self-contained, no shared references.
    resources:
    - name: members
      path: /members
      operations:
      - name: listmembers
        method: GET
        description: List Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmember
        method: POST
        description: Create Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TREMENDOUS_API_KEY}}'
  exposes:
  - type: rest
    namespace: tremendous-members-rest
    port: 8080
    description: REST adapter for Tremendous API — Members. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/members
      name: members
      description: REST surface for members.
      operations:
      - method: GET
        name: listmembers
        description: List Members
        call: tremendous-members.listmembers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmember
        description: Create Member
        call: tremendous-members.createmember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tremendous-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tremendous API — Members. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-members
      description: List Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-members.listmembers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-member
      description: Create Member
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tremendous-members.createmember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
