naftiko: 1.0.0-alpha2
info:
  label: Tremendous API — Campaigns
  description: 'Tremendous API — Campaigns. 2 operations. Lead operation: List Campaigns. Self-contained Naftiko capability
    covering one Tremendous business surface.'
  tags:
  - Tremendous
  - Campaigns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TREMENDOUS_API_KEY: TREMENDOUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: tremendous-campaigns
    baseUri: https://testflight.tremendous.com/api/v2
    description: Tremendous API — Campaigns business capability. Self-contained, no shared references.
    resources:
    - name: campaigns
      path: /campaigns
      operations:
      - name: listcampaigns
        method: GET
        description: List Campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaigns-id
      path: /campaigns/{id}
      operations:
      - name: getcampaign
        method: GET
        description: Get Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Campaign ID
          required: true
    authentication:
      type: bearer
      token: '{{env.TREMENDOUS_API_KEY}}'
  exposes:
  - type: rest
    namespace: tremendous-campaigns-rest
    port: 8080
    description: REST adapter for Tremendous API — Campaigns. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/campaigns
      name: campaigns
      description: REST surface for campaigns.
      operations:
      - method: GET
        name: listcampaigns
        description: List Campaigns
        call: tremendous-campaigns.listcampaigns
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns/{id}
      name: campaigns-id
      description: REST surface for campaigns-id.
      operations:
      - method: GET
        name: getcampaign
        description: Get Campaign
        call: tremendous-campaigns.getcampaign
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tremendous-campaigns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tremendous API — Campaigns. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-campaigns
      description: List Campaigns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-campaigns.listcampaigns
      outputParameters:
      - type: object
        mapping: $.
    - name: get-campaign
      description: Get Campaign
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tremendous-campaigns.getcampaign
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
