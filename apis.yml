apis:
  - aid: tremendous:tremendous
    name: Tremendous API
    description: >-
      The Tremendous REST API enables businesses to programmatically send
      rewards, incentives, and payouts worldwide. The API covers orders,
      rewards, products, campaigns, funding sources, organizations, members,
      invoices, and webhooks. Authentication uses Bearer API keys or OAuth 2.0.
      Rate limit: 30 requests per 30 seconds.
    humanURL: https://developers.tremendous.com/
    baseURL: https://testflight.tremendous.com/api/v2
