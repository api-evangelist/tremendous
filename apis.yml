aid: tremendous
name: Tremendous
description: >-
  Tremendous allows businesses to send rewards, incentives, and payouts
  worldwide using their simple API and dashboard. Access 2000+ payout methods
  including US and global bank transfers, Amazon.com gift cards, Visa and
  Mastercard prepaid cards, PayPal, Venmo, and charity donations. Supports
  multi-product rewards (recipient choice) and single-product rewards.
type: Index
position: Consumer
access: 3rd-Party
